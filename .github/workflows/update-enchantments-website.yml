name: Update Enchantments Website

on:
  push:
    paths:
      - 'data/**'
      - 'assets/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update enchantments JSON
        run: python scripts/update-enchantments-json.py

      - name: Generate markdown
        run: node scripts/generate-enchantments-markdown.js

      - name: Commit changes
        run: bash scripts/commit-website-changes.sh
